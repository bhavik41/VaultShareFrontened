<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Security: Content Security Policy to prevent XSS attacks -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.vaultshare.com http://localhost:5003 ws://localhost:5003 wss://api.vaultshare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <!-- Security: Prevent MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- Security: Enable XSS protection in older browsers -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <!-- Security: Control referrer information -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultShare - Secure File Sharing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
