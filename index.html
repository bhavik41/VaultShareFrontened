<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Security headers in development - more permissive for Spline and other libraries -->
    <!-- In production, use HTTP headers from backend (helmet) instead of meta tags -->
    <!-- Security: Prevent MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- Security: Enable XSS protection in older browsers -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <!-- Security: Control referrer information -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultShare - Secure File Sharing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
